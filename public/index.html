<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Requests | ACME CRM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="suite-bar" role="banner">
      <div class="suite-left">
        <button class="suite-waffle" aria-label="App launcher" type="button">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </button>
        <div class="suite-search">
          <svg class="suite-search-icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M11.6 10.5h-.7l-.2-.2a4.6 4.6 0 1 0-.6.6l.2.2v.7l3.5 3.5 1-1-3.2-3.8zm-4.3 0a3.2 3.2 0 1 1 0-6.4 3.2 3.2 0 0 1 0 6.4z" fill="currentColor"/>
          </svg>
          <input type="search" placeholder="Search..." disabled />
        </div>
      </div>
      <div class="suite-right">
        <button class="suite-icon-btn" aria-label="Setup" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M14 8a6 6 0 1 1-12 0 6 6 0 0 1 12 0zM8 4.5v3l2 1" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
        </button>
        <button class="suite-icon-btn" aria-label="Help" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M6.4 6.2a1.6 1.6 0 1 1 2.2 1.5c-.4.2-.6.5-.6.9V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/><circle cx="8" cy="11.4" r=".7" fill="currentColor"/></svg>
        </button>
        <button class="suite-icon-btn" aria-label="Notifications" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.6a3.6 3.6 0 0 0-3.6 3.6c0 4-1.4 4.4-1.4 5.4h10c0-1-1.4-1.4-1.4-5.4A3.6 3.6 0 0 0 8 1.6zM6.6 12.5a1.4 1.4 0 0 0 2.8 0" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="suite-badge" aria-hidden="true">3</span>
        </button>
        <button class="suite-avatar" aria-label="Account" type="button">EG</button>
      </div>
    </header>

    <div class="app-bar">
      <div class="app-identity">
        <span class="app-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M8 6h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" fill="#fff" opacity=".15"/><path d="M9.5 3h5a1.5 1.5 0 0 1 1.5 1.5V6H8V4.5A1.5 1.5 0 0 1 9.5 3z" fill="#fff"/><rect x="6.5" y="7" width="11" height="13" rx="1.5" stroke="#fff" stroke-width="1.4" fill="none"/><path d="M9 11h6M9 14h6M9 17h4" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/></svg>
        </span>
        <div class="app-name">
          <div class="app-name-title">ACME CRM</div>
          <div class="app-name-sub">Service</div>
        </div>
      </div>
      <nav class="app-tabs" aria-label="Primary">
        <a class="app-tab" href="#" aria-disabled="true">Home</a>
        <a class="app-tab" href="#" aria-disabled="true">Accounts</a>
        <a class="app-tab" href="#" aria-disabled="true">Contacts</a>
        <a class="app-tab active" href="/" aria-current="page">Requests</a>
        <a class="app-tab" href="#" aria-disabled="true">Reports</a>
        <a class="app-tab" href="#" aria-disabled="true">Dashboards</a>
        <a class="app-tab" href="#" aria-disabled="true">More <span class="caret">&or;</span></a>
      </nav>
    </div>

    <main class="page" role="main">
      <section class="page-header" aria-labelledby="objectTitle">
        <div class="page-header-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M7 5h10l1 4H6l1-4z" fill="#fff"/><rect x="5" y="9" width="14" height="11" rx="1.5" fill="#fff" opacity=".25"/><rect x="5" y="9" width="14" height="11" rx="1.5" stroke="#fff" stroke-width="1.5" fill="none"/><path d="M9 13h6M9 16h4" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="page-header-text">
          <div class="page-header-eyebrow">Requests</div>
          <h1 id="objectTitle" class="page-header-title">
            <button class="listview-selector" type="button" aria-haspopup="listbox">
              <span>All Open Requests</span>
              <span class="caret" aria-hidden="true">&or;</span>
            </button>
            <button class="header-icon-btn" aria-label="Pin list" type="button">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M10 1.5l4.5 4.5-2.4 1-2.6 2.6-.8 4-1.2-1.2-3.3 3.3-.8-.8 3.3-3.3-1.2-1.2 4-.8L11.6 7l1-2.4L10 1.5z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
            </button>
            <button class="header-icon-btn" aria-label="Edit list view" type="button">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M11.5 2.5l2 2-7.5 7.5H4v-2L11.5 2.5z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
            </button>
          </h1>
          <div class="page-header-meta">
            <span id="itemCount">&nbsp;</span>
            <span class="meta-sep">&middot;</span>
            <span id="updatedAt">Updated a few seconds ago</span>
            <span class="meta-sep">&middot;</span>
            <span>Filtered by all requests</span>
          </div>
        </div>
        <div class="page-header-actions" role="group" aria-label="List view actions">
          <button class="btn" type="button" aria-disabled="true">Import</button>
          <button class="btn" type="button" aria-disabled="true">Change Owner</button>
          <button class="btn btn-primary" type="button" aria-disabled="true">
            <span class="btn-plus" aria-hidden="true">+</span>&nbsp;New
          </button>
        </div>
      </section>

      <section class="list-card" aria-label="Requests list">
        <div class="list-toolbar">
          <div class="list-toolbar-search">
            <svg class="list-search-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M11.6 10.5h-.7l-.2-.2a4.6 4.6 0 1 0-.6.6l.2.2v.7l3.5 3.5 1-1-3.2-3.8zm-4.3 0a3.2 3.2 0 1 1 0-6.4 3.2 3.2 0 0 1 0 6.4z" fill="currentColor"/>
            </svg>
            <input type="search" placeholder="Search this list..." disabled />
          </div>
          <div class="list-toolbar-spacer"></div>
          <button class="list-toolbar-icon" aria-label="Refresh" type="button">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 3v3h-3" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="list-toolbar-icon" aria-label="Edit list" type="button">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M11.5 2.5l2 2-7.5 7.5H4v-2L11.5 2.5z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>
          </button>
          <button class="list-toolbar-icon" aria-label="Chart" type="button">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 13V7M7.5 13V4M12 13V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M2 14.5h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
          <button class="list-toolbar-icon" aria-label="Filter" type="button">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 3.5h12L9.5 8.5v4l-3 1.5V8.5L2 3.5z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>
          </button>
          <button class="list-toolbar-icon" aria-label="Settings" type="button">
            <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M8 1.6v1.8M8 12.6v1.8M1.6 8h1.8M12.6 8h1.8M3.5 3.5l1.3 1.3M11.2 11.2l1.3 1.3M3.5 12.5l1.3-1.3M11.2 4.8l1.3-1.3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>

        <div class="list-table-wrap" role="region" aria-label="Requests table">
          <table class="list-table" id="listTable">
            <thead>
              <tr>
                <th scope="col" class="col-checkbox">
                  <span class="cb" aria-hidden="true"></span>
                </th>
                <th scope="col" class="col-external">
                  External ID
                  <span class="th-caret" aria-hidden="true">&or;</span>
                </th>
                <th scope="col" class="col-description">
                  Description
                  <span class="th-caret" aria-hidden="true">&or;</span>
                </th>
                <th scope="col" class="col-timestamp">
                  Timestamp
                  <span class="th-caret" aria-hidden="true">&or;</span>
                </th>
                <th scope="col" class="col-actions" aria-label="Row actions"></th>
              </tr>
            </thead>
            <tbody id="listBody">
              <tr class="row-skeleton" aria-hidden="true">
                <td><span class="cb"></span></td>
                <td><span class="skel skel-w-50"></span></td>
                <td><span class="skel skel-w-90"></span></td>
                <td><span class="skel skel-w-40"></span></td>
                <td></td>
              </tr>
              <tr class="row-skeleton" aria-hidden="true">
                <td><span class="cb"></span></td>
                <td><span class="skel skel-w-50"></span></td>
                <td><span class="skel skel-w-70"></span></td>
                <td><span class="skel skel-w-40"></span></td>
                <td></td>
              </tr>
              <tr class="row-skeleton" aria-hidden="true">
                <td><span class="cb"></span></td>
                <td><span class="skel skel-w-50"></span></td>
                <td><span class="skel skel-w-80"></span></td>
                <td><span class="skel skel-w-40"></span></td>
                <td></td>
              </tr>
            </tbody>
          </table>
          <div id="listError" class="list-error" hidden></div>
        </div>

        <div class="list-footer">
          <span id="listFooter">&nbsp;</span>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
