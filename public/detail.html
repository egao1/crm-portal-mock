<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request | ACME CRM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="suite-bar" role="banner">
      <div class="suite-left">
        <button class="suite-waffle" aria-label="App launcher" type="button">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </button>
        <div class="suite-search">
          <svg class="suite-search-icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M11.6 10.5h-.7l-.2-.2a4.6 4.6 0 1 0-.6.6l.2.2v.7l3.5 3.5 1-1-3.2-3.8zm-4.3 0a3.2 3.2 0 1 1 0-6.4 3.2 3.2 0 0 1 0 6.4z" fill="currentColor"/>
          </svg>
          <input type="search" placeholder="Search..." disabled />
        </div>
      </div>
      <div class="suite-right">
        <button class="suite-icon-btn" aria-label="Setup" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M14 8a6 6 0 1 1-12 0 6 6 0 0 1 12 0zM8 4.5v3l2 1" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
        </button>
        <button class="suite-icon-btn" aria-label="Help" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M6.4 6.2a1.6 1.6 0 1 1 2.2 1.5c-.4.2-.6.5-.6.9V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/><circle cx="8" cy="11.4" r=".7" fill="currentColor"/></svg>
        </button>
        <button class="suite-icon-btn" aria-label="Notifications" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.6a3.6 3.6 0 0 0-3.6 3.6c0 4-1.4 4.4-1.4 5.4h10c0-1-1.4-1.4-1.4-5.4A3.6 3.6 0 0 0 8 1.6zM6.6 12.5a1.4 1.4 0 0 0 2.8 0" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="suite-badge" aria-hidden="true">3</span>
        </button>
        <button class="suite-avatar" aria-label="Account" type="button">EG</button>
      </div>
    </header>

    <div class="app-bar">
      <div class="app-identity">
        <span class="app-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M8 6h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" fill="#fff" opacity=".15"/><path d="M9.5 3h5a1.5 1.5 0 0 1 1.5 1.5V6H8V4.5A1.5 1.5 0 0 1 9.5 3z" fill="#fff"/><rect x="6.5" y="7" width="11" height="13" rx="1.5" stroke="#fff" stroke-width="1.4" fill="none"/><path d="M9 11h6M9 14h6M9 17h4" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/></svg>
        </span>
        <div class="app-name">
          <div class="app-name-title">ACME CRM</div>
          <div class="app-name-sub">Service</div>
        </div>
      </div>
      <nav class="app-tabs" aria-label="Primary">
        <a class="app-tab" href="#" aria-disabled="true">Home</a>
        <a class="app-tab" href="#" aria-disabled="true">Accounts</a>
        <a class="app-tab" href="#" aria-disabled="true">Contacts</a>
        <a class="app-tab active" href="/" aria-current="page">Requests</a>
        <a class="app-tab" href="#" aria-disabled="true">Reports</a>
        <a class="app-tab" href="#" aria-disabled="true">Dashboards</a>
        <a class="app-tab" href="#" aria-disabled="true">More <span class="caret">&or;</span></a>
      </nav>
    </div>

    <nav class="record-breadcrumb" aria-label="Breadcrumb">
      <a href="/">Requests</a>
      <span class="record-breadcrumb-sep" aria-hidden="true">&rsaquo;</span>
      <span id="crumbCurrent" class="record-breadcrumb-current">&hellip;</span>
    </nav>

    <main class="record-page" role="main">
      <section class="record-highlights" aria-label="Record highlights">
        <div class="record-highlights-left">
          <div class="record-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 5h10l1 4H6l1-4z" fill="#fff"/><rect x="5" y="9" width="14" height="11" rx="1.5" fill="#fff" opacity=".25"/><rect x="5" y="9" width="14" height="11" rx="1.5" stroke="#fff" stroke-width="1.5" fill="none"/><path d="M9 13h6M9 16h4" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="record-id-block">
            <div class="record-eyebrow">Request</div>
            <h1 id="recordTitle" class="record-title">&hellip;</h1>
            <div class="record-key-fields">
              <div class="record-key-field">
                <div class="record-key-label">Status</div>
                <div class="record-key-value">
                  <span id="hlStatus" class="status-pill status-pill-default">&hellip;</span>
                </div>
              </div>
              <div class="record-key-field">
                <div class="record-key-label">Call Channel</div>
                <div class="record-key-value" id="hlChannel">&mdash;</div>
              </div>
              <div class="record-key-field">
                <div class="record-key-label">Skill</div>
                <div class="record-key-value" id="hlSkill">&mdash;</div>
              </div>
              <div class="record-key-field">
                <div class="record-key-label">Contact Driver</div>
                <div class="record-key-value" id="hlDriver">&mdash;</div>
              </div>
            </div>
          </div>
        </div>
        <div class="record-highlights-actions" role="group" aria-label="Record actions">
          <button class="btn" type="button" aria-disabled="true">Follow</button>
          <button class="btn" type="button" aria-disabled="true">Edit</button>
          <button class="btn" type="button" aria-disabled="true">Delete</button>
          <button class="btn" type="button" aria-disabled="true">Clone</button>
          <button class="btn btn-icon" type="button" aria-label="More actions" aria-disabled="true">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 6l5 5 5-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </section>

      <div class="record-tabs" role="tablist">
        <button class="record-tab active" role="tab" aria-selected="true">Details</button>
        <button class="record-tab" role="tab" aria-selected="false" aria-disabled="true">Related</button>
        <button class="record-tab" role="tab" aria-selected="false" aria-disabled="true">News</button>
        <button class="record-tab" role="tab" aria-selected="false" aria-disabled="true">Activity</button>
      </div>

      <section class="record-card" aria-labelledby="detailsHeading">
        <header class="record-card-header">
          <h2 id="detailsHeading" class="record-card-title">Request Details</h2>
        </header>
        <div class="record-card-body">
          <div class="details-grid">
            <div class="details-field">
              <div class="details-label">External ID</div>
              <div id="fldExternalId" class="details-value details-value-mono">&mdash;</div>
            </div>
            <div class="details-field">
              <div class="details-label">Original Creation Date &amp; Time</div>
              <div id="fldTimestamp" class="details-value">&mdash;</div>
            </div>

            <div class="details-field">
              <div class="details-label">Call Channel</div>
              <div id="fldChannel" class="details-value">&mdash;</div>
            </div>
            <div class="details-field">
              <div class="details-label">Skill</div>
              <div id="fldSkill" class="details-value">&mdash;</div>
            </div>

            <div class="details-field">
              <div class="details-label">Contact Driver</div>
              <div id="fldDriver" class="details-value">&mdash;</div>
            </div>
            <div class="details-field">
              <div class="details-label">Closing Reason</div>
              <div id="fldClosing" class="details-value">
                <span id="fldClosingPill" class="status-pill status-pill-default">&mdash;</span>
              </div>
            </div>

            <div class="details-field details-field-wide">
              <div class="details-label">Description</div>
              <div id="fldDescription" class="details-value details-value-paragraph">&mdash;</div>
            </div>
          </div>
        </div>
      </section>

      <div id="recordError" class="list-error" hidden></div>
    </main>

    <script src="/detail.js"></script>
  </body>
</html>
